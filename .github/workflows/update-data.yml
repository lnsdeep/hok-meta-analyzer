name: Update Hero Data

on:
  schedule:
    # Runs automatically at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows you to trigger the script manually from the GitHub interface

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Allows the action to commit changes back to your repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: Run Scraper
        run: python scraper_unified.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add heroes.json heroes.csv metadata.json
          # Only commit if there are actual changes to the files
          git commit -m "Automated data update" || echo "No changes to commit"
          git push
